{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h4>시험 설정 및 D-day 학습 계획 생성</h4>
    <form method="post">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">시험일</label>
          <input class="form-control" type="date" name="exam_date" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">평일 학습 시간(분)</label>
          <input class="form-control" type="number" name="daily_minutes" min="1" value="60" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">주말 학습 시간(분)</label>
          <input class="form-control" type="number" name="weekend_minutes" min="1" value="120" required>
        </div>
      </div>
      <div class="mt-3">
        <label class="form-label">제외할 요일(선택)</label>
        <div class="d-flex gap-3 flex-wrap">
          {% for i, day in [(0,'월'),(1,'화'),(2,'수'),(3,'목'),(4,'금'),(5,'토'),(6,'일')] %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="excluded_weekdays" value="{{ i }}" id="day{{ i }}">
            <label class="form-check-label" for="day{{ i }}">{{ day }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <button class="btn btn-primary mt-3">계획 생성</button>
    </form>
  </div>
</div>
{% endblock %}
