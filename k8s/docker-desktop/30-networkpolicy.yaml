apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-from-web-only
  namespace: linuxmaster
  labels:
    app: linuxmaster
    tier: db
    env: prod
spec:
  podSelector:
    matchLabels:
      app: linuxmaster
      tier: db
      env: prod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: linuxmaster
              tier: web
              env: prod
      ports:
        - protocol: TCP
          port: 3306

