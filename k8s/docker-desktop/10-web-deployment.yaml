apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: linuxmaster
  labels:
    app: linuxmaster
    tier: web
    env: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: linuxmaster
  labels:
    app: linuxmaster
    tier: web
    env: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linuxmaster
      tier: web
      env: prod
  template:
    metadata:
      labels:
        app: linuxmaster
        tier: web
        env: prod
    spec:
      serviceAccountName: web-sa
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 3306; do
                echo "waiting for db:3306"
                sleep 2
              done
      containers:
        - name: web
          image: 13dongho123/linux_docker:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: linuxmaster-web-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: linuxmaster-app-secret
                  key: SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linuxmaster-app-secret
                  key: OPENAI_API_KEY
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: linuxmaster-app-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linuxmaster-app-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linuxmaster-app-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: linuxmaster-app-secret
                  key: DB_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: uploads
          emptyDir: {}
